spring:
  application:
    name: ms-cuentas

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bpdb}
    username: ${DB_USER:bpuser}
    password: ${DB_PASSWORD:bppassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:bpuser}
    password: ${RABBITMQ_PASSWORD:bppassword}

rabbitmq:
  exchange:
    clientes: clientes.exchange
  queue:
    cliente-creado: cliente.creado.queue
  routing-key:
    cliente-creado: cliente.creado

ms-clientes:
  url: ${MS_CLIENTES_URL:http://localhost:8081}

server:
  port: ${SERVER_PORT:8082}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always