spring:
  application:
    name: ms-clientes-test

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

rabbitmq:
  exchange:
    clientes: clientes.exchange
  queue:
    cliente-creado: cliente.creado.queue
  routing-key:
    cliente-creado: cliente.creado

server:
  port: 0